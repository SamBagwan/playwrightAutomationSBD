name: Playwright Tests (Turbo Parallel)
on:
  push:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      # Skip browser install to save time; use existing local browsers
      run: npm install

    - name: Run Tests in Parallel
      # 1. We remove --workers=1 to let Playwright use multiple CPU cores.
      # 2. --fully-parallel forces tests within a single file to run at the same time.
      run: |
        npx playwright test tests/SBD_DSA_Flow.spec.js tests/JarvisAutomation.spec.js \
        --project=chromium \
        --fully-parallel \
        --trace off
        
    - name: Upload Report on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
