name: End-to-End Automation (API + UI)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  full-suite:
    name: Execute API then UI
    runs-on: self-hosted
    timeout-minutes: 60
    
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0' # Bypasses corporate SSL/Self-signed cert issues

    steps:
      # 1. Clear previous runs to ensure a clean workspace
      - name: Cleanup Workspace
        run: rm -rf ui-tests api-tests

      # 2. Checkout Playwright Code (Main) into a subfolder
      - name: Checkout Playwright (Main)
        uses: actions/checkout@v4
        with:
          path: ui-tests

      # 3. Checkout RestAssured Code (sbdFlow-Sameer) into a subfolder
      - name: Checkout RestAssured (API Branch)
        uses: actions/checkout@v4
        with:
          ref: sbdFlow-Sameer
          path: api-tests

      # 4. Setup Java for RestAssured
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 5. Execute API Setup (RestAssured)
      - name: Step 1 - Execute API (RestAssured)
        run: |
          cd api-tests
          mvn test -Dtest=UATsbdflowSoleProp

      # 6. Setup Node for Playwright
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      # 7. Execute Playwright Automation
      - name: Step 2 - Execute UI (Playwright)
        run: |
          cd ui-tests
          npm install
          npx playwright test tests/JarvisAutomation.spec.js --project=chromium --workers=1 --trace off

      # 8. Upload results if anything fails
      - name: Upload Execution Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-execution-report
          path: ui-tests/playwright-report/
          retention-days: 7
