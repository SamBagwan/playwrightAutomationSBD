name: Playwright Tests (Turbo Parallel)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Automation Suite
    timeout-minutes: 60
    runs-on: self-hosted
    
    # This block fixes the "self-signed certificate" error during artifact upload
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0'

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 3. Install Dependencies
        # Using npm install is faster on self-hosted runners than npm ci
        run: npm install

      - name: 4. Step 1 - Execute DSA Flow
        # Using 1 worker for login-heavy steps to prevent session conflicts
        run: npx playwright test tests/SBD_DSA_Flow.spec.js --project=chromium --workers=1 --trace off

      - name: 5. Step 2 - Execute Jarvis Automation
        # Using 4 workers for the heavy lifting once logged in
        run: npx playwright test tests/JarvisAutomation.spec.js --project=chromium --workers=4 --trace off
        
      - name: 6. Upload Results
        # 'always()' ensures you get a report even if a test fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-execution-report
          path: playwright-report/
          retention-days: 7
