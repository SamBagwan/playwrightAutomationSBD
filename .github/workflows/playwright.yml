name: Playwright Tests (Turbo Parallel)
on:
  push:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        # Uses local cache on your Mac to speed up execution
        run: npm install

      - name: Step 1: Execute DSA Flow
        # Added --workers to parallelize tests inside this specific file
        run: npx playwright test tests/SBD_DSA_Flow.spec.js --project=chromium --workers=4 --trace off

      - name: Step 2: Execute Jarvis Automation
        # This only runs if Step 1 passes
        run: npx playwright test tests/JarvisAutomation.spec.js --project=chromium --workers=4 --trace off
        
      - name: Upload Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
