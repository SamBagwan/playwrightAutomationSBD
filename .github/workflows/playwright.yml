name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test: # This is the job name
    timeout-minutes: 60
    runs-on: self-hosted  # CRITICAL: Use self-hosted here to access the .corp network
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      # Removed --headed. Even on self-hosted, CI should usually run headless.
      run: npx playwright test tests/JarvisAutomation.spec.js --project=chromium

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
