name: Playwright Specific File Execution
run-name: ${{ github.actor }} is running specific automation tests 🚀
on:
  push:
    branches:
      - main

jobs:
  Run-Specific-Test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: Step 1: Run DSA Flow
        run: npx playwright test tests/SBD_DSA_Flow.spec.js --project=chromium

      - name: Step 2: Run Jarvis Automation
        # This will only run if Step 1 succeeds
        run: npx playwright test tests/JarvisAutomation.spec.js --project=chromium
        
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
