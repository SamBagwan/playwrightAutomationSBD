name: Playwright Specific File Execution
run-name: ${{ github.actor }} is running specific automation tests 🚀
on: [push]

jobs:
  Run-Specific-Test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Specific Playwright File
        # Change 'tests/SBD_DSA_Flow.spec.js' to your actual file path
        run: npx playwright test tests/full_lifecycle.spec.js --project=chromium --headed
        
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
